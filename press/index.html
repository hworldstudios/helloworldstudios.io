<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Press - Hello World Studios</title>
    <meta
      name="description"
      content="Press kit for Hello World Studios — coming soon."
    />
    <meta name="theme-color" content="#0c0c0e" />
    <meta name="robots" content="noindex" />
    <link
      rel="icon"
      type="image/png"
      href="../assets/favicon-light-theme.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      href="../assets/favicon-dark-theme.png"
      media="(prefers-color-scheme: dark)"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #0c0c0e;
        --bg-alt: #131316;
        --text: #f4f4f2;
        --muted: #a0a0a4;
        --accent: #2f9bff;
        --border: #2a2a30;
        --header-h: 68px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        background: var(--bg);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      a {
        color: var(--accent);
      }

      .site-header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: var(--header-h);
        z-index: 1000;
        display: flex;
        align-items: center;
        background: rgba(12, 12, 14, 0.72);
        backdrop-filter: saturate(140%) blur(12px);
        -webkit-backdrop-filter: saturate(140%) blur(12px);
        border-bottom: 1px solid var(--border);
      }
      .site-header__inner {
        width: 100%;
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 1.25rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }
      .brand {
        font-family: "Montserrat", sans-serif;
        font-weight: 300;
        font-size: clamp(0.7rem, 2.4vw, 0.95rem);
        letter-spacing: 0.35em;
        text-transform: uppercase;
        text-decoration: none;
        color: var(--text);
        white-space: nowrap;
        padding-left: 0.35em;
      }
      .back {
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        text-decoration: none;
        color: var(--muted);
        transition: color 0.15s ease;
      }
      .back:hover {
        color: var(--text);
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: calc(var(--header-h) + 1.5rem) 1.25rem 1.5rem;
      }
      h1 {
        font-size: clamp(1.8rem, 5vw, 2.6rem);
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        margin: 0;
      }

      footer {
        border-top: 1px solid var(--border);
        text-align: center;
        padding: 2.5rem 1.25rem;
        color: var(--muted);
        font-size: 0.78rem;
      }
    </style>
  </head>

  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="brand" href="../">Hello World Studios</a>
        <a class="back" href="../">&larr; Back to home</a>
      </div>
    </header>

    <main>
      <h1>Press kit coming soon</h1>
    </main>

    <footer>
      <p>
        &copy; <span id="year"></span> Hello World Studios. All rights reserved.
      </p>
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
